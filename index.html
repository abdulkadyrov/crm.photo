<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <title>School Photo Flow</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">School Photo Flow</p>
          <h1 id="screen-title">Проекты</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">
            <span data-icon="theme"></span>
          </button>
          <button class="primary-button compact" id="add-project" type="button">Проект</button>
        </div>
      </header>

      <main id="view" class="view" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Основная навигация">
        <button class="nav-item active" type="button" data-route="home">
          <span data-icon="home"></span>
          <span>Home</span>
        </button>
        <button class="nav-item" type="button" data-route="search">
          <span data-icon="search"></span>
          <span>Search</span>
        </button>
        <button class="nav-item nav-scan" type="button" data-route="scan">
          <span data-icon="scan"></span>
          <span>Scan QR</span>
        </button>
        <button class="nav-item" type="button" data-route="classes">
          <span data-icon="classes"></span>
          <span>Classes</span>
        </button>
        <button class="nav-item" type="button" data-route="settings">
          <span data-icon="settings"></span>
          <span>Settings</span>
        </button>
      </nav>
    </div>

    <input id="media-input" class="visually-hidden" type="file" accept="image/*,video/*" capture="environment" />
    <input id="zip-input" class="visually-hidden" type="file" accept=".zip,application/zip" />
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
